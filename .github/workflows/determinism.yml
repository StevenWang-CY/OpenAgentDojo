name: determinism

# Nightly regression guard for the grading engine. The contract is documented
# in IMPLEMENTATION_PLAN.md §11 and apps/api/scripts/replay_determinism.py:
# byte-identical inputs to ``compute_score`` must produce byte-identical
# ``ScoreReport`` outputs across runs and across interpreter restarts.
#
# This job runs the script against a fixture mission (no DB / sandbox needed),
# replaying the ``ideal`` envelope five times. Any drift fails the job and
# files a noisy alert on the workflow run.

on:
  schedule:
    # 06:00 UTC nightly. Pick the off-peak window so a flake doesn't page
    # anyone working hours; this is a quality signal, not a paging signal.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  fixture-replay:
    name: replay fixture mission 5x
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync deps
        run: uv sync --extra dev

      - name: Replay determinism (fixture mode, 5 runs)
        # Pinning --runs explicitly so a future "make it 50" experiment in the
        # script's default does not silently turn this into a 50× workflow.
        run: uv run python scripts/replay_determinism.py --runs 5
