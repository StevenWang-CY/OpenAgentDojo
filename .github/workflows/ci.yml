name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned action SHAs (verified against the upstream tags below as of M8 ship).
# Update the tag in the trailing comment whenever you bump the SHA so the next
# upgrade audit doesn't have to dig through history.
#
# Re-resolving in the future: `gh api repos/<owner>/<repo>/git/refs/tags/<tag>`.

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # ESLint 10 requires node ^20.19 || ^22.13 || >=24; this also matches the
  # node version the web suite is developed/verified against.
  NODE_VERSION: "22.21.0"
  PNPM_VERSION: "9.12.0"

jobs:
  # ---------------------------------------------------------------------
  # lint-py — ruff + mypy on the FastAPI backend.
  # ---------------------------------------------------------------------
  lint-py:
    name: lint (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync deps
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check app

      - name: ruff format --check
        run: uv run ruff format --check app

      - name: mypy
        run: uv run mypy app

      - name: env-example parity
        # Catches drift between root, apps/api, and compose .env.example
        # files. Backstops the pre-commit hook; CI must fail if any of
        # the three falls out of lockstep with the others.
        run: uv run python scripts/check_env_examples.py

  # ---------------------------------------------------------------------
  # lint-web — eslint + tsc --noEmit on the Next.js frontend.
  # ---------------------------------------------------------------------
  lint-web:
    name: lint (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        # Lockfile must be in sync with package.json in CI — a drifted lockfile
        # is the bug we want this job to catch on PRs.
        run: pnpm install --frozen-lockfile=true

      - name: Lint
        run: pnpm --filter @arena/web lint

      - name: Typecheck
        run: pnpm --filter @arena/web typecheck

  # ---------------------------------------------------------------------
  # test-py — pytest with a real postgres + redis side-car.
  # ---------------------------------------------------------------------
  test-py:
    name: test (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arena
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://arena:arena@localhost:5432/arena
      SYNC_DATABASE_URL: postgresql://arena:arena@localhost:5432/arena
      REDIS_URL: redis://localhost:6379/0
      SANDBOX_DRIVER: local
      SESSION_SECRET: ci-secret-change-me-32-chars-min-aaaa
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync deps
        run: uv sync --extra dev

      - name: Preload Postgres extensions
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=arena psql -h localhost -U arena -d arena -c "CREATE EXTENSION IF NOT EXISTS citext; CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest --maxfail=1

  # ---------------------------------------------------------------------
  # test-py-staging-guardrails — validator-only run that asserts the
  # staging/production config guardrails reject dev-grade secrets. The
  # main test-py job runs under ARENA_ENV=development (permissive); this
  # job exercises the strict path so a regression in the validator is
  # caught at PR time rather than at deploy time.
  # ---------------------------------------------------------------------
  test-py-staging-guardrails:
    name: test (python, staging guardrails)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      ARENA_ENV: staging
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync deps
        run: uv sync --extra dev

      - name: Run validator tests
        # tests/test_config_validation.py exercises both happy-path and
        # failure-path guardrails. Running it with ARENA_ENV=staging in the
        # ambient env confirms staging triggers the same strict checks as
        # production (the validator's `arena_env in {staging, production}`
        # branch is the one we care about here).
        run: uv run pytest tests/test_config_validation.py -v

      - name: Assert dev secret rejected under ARENA_ENV=staging
        # Belt-and-braces smoke: import Settings with a dev-style secret in
        # a staging-shaped env and confirm Pydantic raises. If validation
        # silently passes, exit non-zero so CI flags the regression.
        env:
          ARENA_ENV: staging
          SESSION_SECRET: dev-secret-change-me-32-chars-min-aaaa
          RESEND_API_KEY: re_xxx
          S3_ACCESS_KEY_ID: akid
          S3_SECRET_ACCESS_KEY: secret
          S3_BUCKET: staging-bucket
          DATABASE_URL: postgresql+asyncpg://u:p@staging-db:5432/arena
          WEB_ORIGIN: https://staging.arena.example
          ALLOWED_HOSTS: staging.arena.example
          ALLOW_DEV_AUTH: "false"
        run: |
          uv run python -c "
          import sys
          try:
              from app.config import Settings
              Settings()
          except Exception as e:
              print(f'OK — validator rejected dev-grade secret: {e}')
              sys.exit(0)
          print('FAIL — staging accepted a dev-grade SESSION_SECRET', file=sys.stderr)
          sys.exit(1)
          "

  # ---------------------------------------------------------------------
  # test-web — vitest on the frontend.
  # ---------------------------------------------------------------------
  test-web:
    name: test (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        # Frozen lockfile so a missing-lockfile-commit fails CI loudly.
        run: pnpm install --frozen-lockfile=true

      - name: Run vitest
        # The @arena/web "test" script is `vitest run` already; the
        # trailing --run flag is rejected by pnpm 9 ("Unknown option").
        run: pnpm --filter @arena/web test

  # ---------------------------------------------------------------------
  # validate-missions — schema + structural checks on every mission YAML.
  # ---------------------------------------------------------------------
  validate-missions:
    name: validate missions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync deps
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Validate missions
        run: uv --project apps/api run python apps/api/scripts/validate_missions.py

  # ---------------------------------------------------------------------
  # build-images — build the prod Dockerfiles on main, sign them with cosign,
  # and attach an SBOM. No push: the deploy workflow handles registry pushes.
  # ---------------------------------------------------------------------
  build-images:
    name: build images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-py, lint-web, test-py, test-py-staging-guardrails, test-web, validate-missions]
    permissions:
      contents: read
      id-token: write   # keyless cosign signing via OIDC
      packages: write   # writes SBOM artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build api image
        id: build-api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          load: true
          tags: agentarena/api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: SBOM (api)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.7
        with:
          image: agentarena/api:ci
          format: spdx-json
          artifact-name: sbom-api.spdx.json

      - name: cosign sign (api)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          # Keyless OIDC signing — anchors signature to this workflow run.
          # Replace agentarena/api:ci with the registry-pushed digest in
          # the deploy workflow that pushes for real.
          cosign sign --yes --recursive agentarena/api:ci || \
            echo "cosign sign skipped — image not pushed to a signable registry in CI"

      - name: Build web image
        id: build-web
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          load: true
          tags: agentarena/web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: SBOM (web)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.7
        with:
          image: agentarena/web:ci
          format: spdx-json
          artifact-name: sbom-web.spdx.json

      - name: cosign sign (web)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes --recursive agentarena/web:ci || \
            echo "cosign sign skipped — image not pushed to a signable registry in CI"
