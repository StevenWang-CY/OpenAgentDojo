name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Broad-spectrum credential scan. Each pattern below is a tripwire — if
  # any tracked file matches, the job fails and prints the matching lines.
  # Backstop for the pre-commit hook (CI catches commits that bypassed
  # local hooks). Update the pattern list whenever we adopt a new provider.
  #
  # Patterns:
  #   ABSK<...>            — AWS Bedrock bearer token (Anthropic via Bedrock)
  #   sk-ant-<...>         — Anthropic direct API key
  #   AKIA<...>            — AWS access key id (long-lived IAM)
  #   ASIA<...>            — AWS session access key id (short-lived STS)
  #   sk-proj-<...>        — OpenAI project-scoped key
  #   sk-<...>             — OpenAI legacy / generic LLM key
  #   ghp_<...>            — GitHub personal access token (classic)
  #   github_pat_<...>     — GitHub fine-grained personal access token
  # -----------------------------------------------------------------------
  credential-grep:
    name: forbid known credential prefixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan tracked files for credential prefixes
        shell: bash
        run: |
          set -euo pipefail

          # Each pattern is anchored to a known prefix + a minimum suffix
          # length so we don't false-positive on placeholder words in docs.
          # Patterns are POSIX-ERE-friendly (used with grep -E).
          patterns=(
            'ABSK[A-Za-z0-9+/=_-]{8,}'        # AWS Bedrock bearer
            'sk-ant-[A-Za-z0-9_-]{20,}'       # Anthropic direct API key
            'AKIA[0-9A-Z]{16}'                # AWS long-lived access key id
            'ASIA[0-9A-Z]{16}'                # AWS STS session access key id
            'sk-proj-[A-Za-z0-9_-]{20,}'      # OpenAI project key
            'sk-[A-Za-z0-9_-]{40,}'           # Generic OpenAI-style key
            'ghp_[A-Za-z0-9]{36,}'            # GitHub classic PAT
            'github_pat_[A-Za-z0-9_]{60,}'    # GitHub fine-grained PAT
          )

          # Join with `|` for a single grep pass.
          combined=$(IFS='|'; echo "${patterns[*]}")

          # keys.md is gitignored; if somebody accidentally tracks it the
          # `git ls-files` filter still picks it up and fails.
          # Exclude files that legitimately reference these patterns (the
          # regex list itself, the mirroring pre-commit hook, and the
          # canonical AWS docs example used as a validator test fixture).
          # Pathspec exclusion is portable and doesn't depend on grep's
          # NUL-mode semantics.
          mapfile -t hits < <(
            git ls-files -z -- \
              ':(exclude).github/workflows/secret-scan.yml' \
              ':(exclude).pre-commit-config.yaml' \
              ':(exclude)apps/api/tests/grading/test_no_secrets.py' \
            | xargs -0 grep -InE "${combined}" --color=never 2>/dev/null \
            || true
          )

          if (( ${#hits[@]} > 0 )); then
            echo "::error::Credential prefix detected in tracked files:"
            for line in "${hits[@]}"; do
              echo "  $line"
            done
            exit 1
          fi

          echo "no credential prefixes found in tracked files"
