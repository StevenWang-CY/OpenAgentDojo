name: Contracts

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # Keep in lockstep with ci.yml — ESLint 10 needs node ≥20.19 (the web
  # typecheck job here runs on the same toolchain).
  NODE_VERSION: "22.21.0"
  PNPM_VERSION: "9.12.0"

jobs:
  # -------------------------------------------------------------------------
  # api-contracts — regenerate openapi.json + shared-types/api.gen.ts and
  # fail the build if either file is stale relative to the source schemas.
  # -------------------------------------------------------------------------
  api-contracts:
    name: api contracts (no drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        # Pinned to the setup-uv v7 release commit. That commit is the very
        # same SHA ci.yml pins (the action's `v7` tag and the older `v3.2.4`
        # tag resolve to one commit), so uv stays consistent across workflows.
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync python deps
        working-directory: apps/api
        run: uv sync --extra dev

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install node deps
        # Frozen lockfile — drift between pnpm-lock.yaml and package.json
        # fails this step instead of being silently fixed up.
        run: pnpm install --frozen-lockfile=true

      - name: Dump openapi.json
        run: uv --project apps/api run python apps/api/scripts/dump_openapi.py

      - name: Regenerate shared-types/api.gen.ts
        run: pnpm --filter @arena/shared-types regen

      - name: Assert no drift
        run: |
          git diff --exit-code apps/api/openapi.json packages/shared-types/src/api.gen.ts \
            || (
              echo "::error::OpenAPI / shared-types drift detected. Run:"
              echo "  uv --project apps/api run python apps/api/scripts/dump_openapi.py"
              echo "  pnpm --filter @arena/shared-types regen"
              echo "and commit the result."
              exit 1
            )

      - name: shared-types typecheck
        run: pnpm --filter @arena/shared-types typecheck

      - name: web typecheck (catches contract-shape regressions in call sites)
        run: pnpm --filter @arena/web typecheck

      - name: contract tests (msw)
        run: pnpm --filter @arena/web exec vitest run __tests__/contract
