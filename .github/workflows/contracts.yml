name: Contracts

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20.18.0"
  PNPM_VERSION: "9.12.0"

jobs:
  # -------------------------------------------------------------------------
  # api-contracts — regenerate openapi.json + shared-types/api.gen.ts and
  # fail the build if either file is stale relative to the source schemas.
  # -------------------------------------------------------------------------
  api-contracts:
    name: api contracts (no drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        # TODO: pin via sha — currently floating on v7 (ci.yml pins v3.2.4
        # against a different SHA so we cannot reuse that one here).
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Sync python deps
        working-directory: apps/api
        run: uv sync --extra dev

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install node deps
        # Frozen lockfile — drift between pnpm-lock.yaml and package.json
        # fails this step instead of being silently fixed up.
        run: pnpm install --frozen-lockfile=true

      - name: Dump openapi.json
        run: uv --project apps/api run python apps/api/scripts/dump_openapi.py

      - name: Regenerate shared-types/api.gen.ts
        run: pnpm --filter @arena/shared-types regen

      - name: Assert no drift
        run: |
          git diff --exit-code apps/api/openapi.json packages/shared-types/src/api.gen.ts \
            || (
              echo "::error::OpenAPI / shared-types drift detected. Run:"
              echo "  uv --project apps/api run python apps/api/scripts/dump_openapi.py"
              echo "  pnpm --filter @arena/shared-types regen"
              echo "and commit the result."
              exit 1
            )

      - name: shared-types typecheck
        run: pnpm --filter @arena/shared-types typecheck

      - name: web typecheck (catches contract-shape regressions in call sites)
        run: pnpm --filter @arena/web typecheck

      - name: contract tests (msw)
        run: pnpm --filter @arena/web exec vitest run __tests__/contract
