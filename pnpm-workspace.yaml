packages:
  - "apps/web"
  - "packages/*"
# NOTE: missions/_shared/repos/* are intentionally NOT workspace members.
# They install standalone (each pack has its own pnpm-workspace.yaml +
# pnpm-lock.yaml) so the sandbox provisioner can copytree(symlinks=True)
# without dragging in symlinks that point to this monorepo's .pnpm store.
# See apps/api/app/sandbox/local_driver.py:provision.
