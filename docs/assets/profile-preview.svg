<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" role="img" aria-label="OpenAgentDojo public profile — a large @handle, GitHub-verified chip, missions/best-score/badges stats, an averaged supervision radar with a verified-only toggle, and a per-mission history table">
  <defs>
    <clipPath id="pwin"><rect x="8" y="4" width="784" height="528" rx="12"/></clipPath>
    <style>
      .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
      .sans{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Inter,sans-serif;}
      .ink{fill:#13171D;}.mut{fill:#5C6B7C;}.pri{fill:#0A45F5;}.grn{fill:#15A05B;}.amb{fill:#B5790F;}.red{fill:#C2452F;}
    </style>
  </defs>
  <rect x="8" y="12" width="784" height="524" rx="14" fill="#0B1B3A" opacity="0.10"/>
  <g clip-path="url(#pwin)">
    <rect x="8" y="4" width="784" height="528" fill="#FFFFFF"/>
    <!-- chrome -->
    <rect x="8" y="4" width="784" height="30" fill="#F4F6FA"/>
    <circle cx="30" cy="19" r="5" fill="#FF5F57"/><circle cx="48" cy="19" r="5" fill="#FEBC2E"/><circle cx="66" cy="19" r="5" fill="#28C840"/>
    <text x="400" y="23" text-anchor="middle" class="mono mut" font-size="11">openagentdojo.app / profile / jane</text>
    <line x1="8" y1="34" x2="792" y2="34" stroke="#E3E8EF"/>

    <!-- eyebrow -->
    <text x="26" y="58" class="mono mut" font-size="11" letter-spacing="1.5"><tspan class="pri">//</tspan> PUBLIC PROFILE</text>

    <!-- header: big @handle + name + verified + joined -->
    <text x="26" y="116" class="mono ink" font-size="46" font-weight="500" letter-spacing="-1"><tspan class="mut">@</tspan>jane</text>
    <text x="26" y="140" class="sans ink" font-size="14.5" font-weight="600">Jane Doe</text>
    <rect x="120" y="128" width="150" height="20" rx="10" fill="#EAF7EF"/><text x="195" y="142" text-anchor="middle" class="mono grn" font-size="10">✓ verified · github/jane</text>
    <text x="26" y="160" class="mono mut" font-size="11">joined Apr 2026</text>
    <!-- stats -->
    <text x="566" y="124" text-anchor="end" class="mono ink" font-size="26" font-weight="600">14</text><text x="566" y="142" text-anchor="end" class="mono mut" font-size="10" letter-spacing="0.6">MISSIONS</text>
    <text x="664" y="124" text-anchor="end" class="mono ink" font-size="26" font-weight="600">92</text><text x="664" y="142" text-anchor="end" class="mono mut" font-size="10" letter-spacing="0.6">BEST SCORE</text>
    <text x="760" y="124" text-anchor="end" class="mono ink" font-size="26" font-weight="600">6</text><text x="760" y="142" text-anchor="end" class="mono mut" font-size="10" letter-spacing="0.6">BADGES</text>
    <line x1="26" y1="176" x2="766" y2="176" stroke="#E3E8EF"/>

    <!-- ── left: rubric averages radar ─────────────────────── -->
    <text x="26" y="202" class="mono mut" font-size="11" font-weight="600" letter-spacing="1"><tspan>// RUBRIC AVERAGES</tspan></text>
    <text x="318" y="202" text-anchor="end" class="mono mut" font-size="10">across 14 graded sessions</text>
    <!-- verified/all toggle -->
    <rect x="26" y="214" width="180" height="24" rx="6" fill="#FFFFFF" stroke="#E3E8EF"/>
    <rect x="29" y="217" width="92" height="18" rx="4" fill="#EEF1F6"/>
    <text x="75" y="230" text-anchor="middle" class="sans ink" font-size="10.5" font-weight="500">Verified only</text>
    <text x="164" y="230" text-anchor="middle" class="sans mut" font-size="10.5">Show all</text>
    <!-- radar -->
    <polygon points="165,285 235.4,318.9 252.8,395.1 204.1,456.1 125.9,456.1 77.2,395.1 94.6,318.9" fill="none" stroke="#E3E8EF"/>
    <polygon points="165,321 207.2,341.4 217.7,387 188.4,423.7 141.6,423.7 112.3,387 122.8,341.4" fill="none" stroke="#E8ECF2"/>
    <g stroke="#E3E8EF">
      <line x1="165" y1="375" x2="165" y2="285"/><line x1="165" y1="375" x2="235.4" y2="318.9"/><line x1="165" y1="375" x2="252.8" y2="395.1"/>
      <line x1="165" y1="375" x2="204.1" y2="456.1"/><line x1="165" y1="375" x2="125.9" y2="456.1"/><line x1="165" y1="375" x2="77.2" y2="395.1"/><line x1="165" y1="375" x2="94.6" y2="318.9"/>
    </g>
    <polygon points="165,303 219.9,331.3 229.9,389.9 198.2,443.9 133,441.5 87.8,392.7 101.7,324.5" fill="#13171D" fill-opacity="0.08" stroke="#13171D" stroke-width="1.3"/>
    <g class="mono mut" font-size="9">
      <text x="165" y="277" text-anchor="middle">correctness</text>
      <text x="242" y="316" text-anchor="start">verif</text>
      <text x="258" y="399" text-anchor="start">review</text>
      <text x="204" y="472" text-anchor="middle">prompt</text>
      <text x="126" y="472" text-anchor="middle">ctx</text>
      <text x="72" y="399" text-anchor="end">safety</text>
      <text x="90" y="316" text-anchor="end">min</text>
    </g>

    <line x1="332" y1="190" x2="332" y2="510" stroke="#E3E8EF"/>

    <!-- ── right: mission history ──────────────────────────── -->
    <text x="352" y="202" class="mono mut" font-size="11" font-weight="600" letter-spacing="1">// MISSION HISTORY</text>
    <text x="766" y="202" text-anchor="end" class="mono mut" font-size="10">5 sessions</text>
    <g class="mono mut" font-size="9.5" letter-spacing="0.4">
      <text x="352" y="224">MISSION</text><text x="566" y="224">LEVEL</text><text x="640" y="224">COMPLETED</text><text x="752" y="224" text-anchor="end">SCORE</text>
    </g>
    <line x1="352" y1="232" x2="766" y2="232" stroke="#EEF1F6"/>
    <!-- rows -->
    <g>
      <!-- r1 -->
      <text x="352" y="254" class="sans ink" font-size="12.5" font-weight="500">Expired Session Cookie…</text>
      <text x="352" y="268" class="mono mut" font-size="10.5">auth-cookie-expiration</text>
      <text x="566" y="258" class="mono amb" font-size="10" letter-spacing="0.3">INTERMEDIATE</text>
      <text x="640" y="258" class="mono mut" font-size="10.5">2026-05-23</text>
      <text x="752" y="258" text-anchor="end" class="mono ink" font-size="13" font-weight="600">92</text>
      <text x="766" y="258" text-anchor="end" class="mut" font-size="11">→</text>
      <line x1="352" y1="282" x2="766" y2="282" stroke="#F2F4F8"/>
      <!-- r2 -->
      <text x="352" y="304" class="sans ink" font-size="12.5" font-weight="500">Goroutine Leak on Shutdown</text>
      <text x="352" y="318" class="mono mut" font-size="10.5">goroutine-leak</text>
      <text x="566" y="308" class="mono amb" font-size="10" letter-spacing="0.3">INTERMEDIATE</text>
      <text x="640" y="308" class="mono mut" font-size="10.5">2026-05-21</text>
      <text x="752" y="308" text-anchor="end" class="mono ink" font-size="13" font-weight="600">88</text>
      <text x="766" y="308" text-anchor="end" class="mut" font-size="11">→</text>
      <line x1="352" y1="332" x2="766" y2="332" stroke="#F2F4F8"/>
      <!-- r3 -->
      <text x="352" y="354" class="sans ink" font-size="12.5" font-weight="500">Security Validation Removed</text>
      <text x="352" y="368" class="mono mut" font-size="10.5">security-validation-removed</text>
      <text x="566" y="358" class="mono red" font-size="10" letter-spacing="0.3">ADVANCED</text>
      <text x="640" y="358" class="mono mut" font-size="10.5">2026-05-19</text>
      <text x="752" y="358" text-anchor="end" class="mono ink" font-size="13" font-weight="600">84</text>
      <text x="766" y="358" text-anchor="end" class="mut" font-size="11">→</text>
      <line x1="352" y1="382" x2="766" y2="382" stroke="#F2F4F8"/>
      <!-- r4 -->
      <text x="352" y="404" class="sans ink" font-size="12.5" font-weight="500">Async Race Condition</text>
      <text x="352" y="418" class="mono mut" font-size="10.5">async-race-condition</text>
      <text x="566" y="408" class="mono red" font-size="10" letter-spacing="0.3">ADVANCED</text>
      <text x="640" y="408" class="mono mut" font-size="10.5">2026-05-17</text>
      <text x="752" y="408" text-anchor="end" class="mono ink" font-size="13" font-weight="600">71</text>
      <text x="766" y="408" text-anchor="end" class="mut" font-size="11">→</text>
      <line x1="352" y1="432" x2="766" y2="432" stroke="#F2F4F8"/>
      <!-- r5 -->
      <text x="352" y="454" class="sans ink" font-size="12.5" font-weight="500">Pandas iterrows Vectorised…</text>
      <text x="352" y="468" class="mono mut" font-size="10.5">python-pandas-perf-trap</text>
      <text x="566" y="458" class="mono amb" font-size="10" letter-spacing="0.3">INTERMEDIATE</text>
      <text x="640" y="458" class="mono mut" font-size="10.5">2026-05-15</text>
      <text x="752" y="458" text-anchor="end" class="mono ink" font-size="13" font-weight="600">65</text>
      <text x="766" y="458" text-anchor="end" class="mut" font-size="11">→</text>
    </g>
    <text x="352" y="500" class="mono mut" font-size="10.5">// public aggregates use best-per-mission · attempt count stays private</text>
  </g>
  <rect x="8" y="4" width="784" height="528" rx="12" fill="none" stroke="#DCE2EB"/>
</svg>
