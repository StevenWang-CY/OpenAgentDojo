# Mission $mission_id — score-envelope acceptance test (see §19.1).
#
# Consumed by ``apps/api/tests/missions/`` nightly self-tests. Two
# synthetic event streams are replayed against this mission:
#
#   * ``unmodified`` — the user accepts the canned agent patch verbatim
#     with no further edits or verification. Expected score lands in the
#     embarrassing-middle band.
#   * ``ideal``     — the user selects the right context, verifies,
#     reviews the diff, edits/extends it, adds a regression test, and
#     submits. Expected score lands near the ceiling.
#
# Tighten these envelopes once you have baseline measurements from real
# attempts.

mission_id: $mission_id
mission_version: 1
acceptance:
  min_unmodified: 30
  max_unmodified: 60
  min_ideal: 90
