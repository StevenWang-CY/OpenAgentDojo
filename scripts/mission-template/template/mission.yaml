agent:
  patch_file: agent_patch.diff
  response_template: prompts/response.md
  reasoning_template: prompts/reasoning.md
  intents_file: prompts/intents.yaml
  applies_when:
    prompt_min_chars: 40
    prompt_must_contain_any:
      - fix
      - repair
      - investigate
  apply_mode: on_user_confirm

visible_tests:
  - "TODO: visible test label"

hidden_tests:
  command: bash hidden_tests/runner.sh
  expected_pass:
    - "TODO: hidden test label"

validators:
  - kind: diff_scope
    max_files_changed: 4
    max_added_lines: 120
    must_touch_any_of:
      - TODO
    must_not_touch:
      - TODO

# Canonical 30/15/15/10/10/10/10 — see apps/api/app/grading/dimensions.py.
scoring_weights:
  final_correctness: 30
  verification: 15
  agent_review: 15
  prompt_quality: 10
  context_selection: 10
  safety: 10
  diff_minimality: 10

expected_diff_lines_p50: 20

reward_signals:
  prompt_quality:
    must_include_any:
      - TODO
    penalty_if_under_chars: 40
  verification:
    required_categories:
      - test
    bonus_if_run_before_patch: true
  agent_review:
    require_diff_open: true
    bonus_if_revert_or_edit_after_diff: true
  safety:
    must_not_run_commands:
      - "rm -rf"
      - "curl"
    must_not_introduce_deps: true
