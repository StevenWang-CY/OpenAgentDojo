<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1040 240"
  fill="none"
  role="img"
  aria-label="OpenAgentDojo · supervisor training"
>
  <!-- ────────────────────────────────────────────────────────────────
       Mark — clean geometric reconstruction. Position relationship
       preserved from the SVG design reference (mark center at 724,822
       in source coords; relative spacing of <|>, octagon, and pedestal
       all unchanged). Only the rough traced curves are replaced with
       crisp straight edges.
       ──────────────────────────────────────────────────────────────── -->
  <g transform="translate(10, 10) scale(0.94) translate(-617, -735)">
    <!-- Octagonal frame: outer + inner cut-out via even-odd fill -->
    <path
      fill="#13171D"
      fill-rule="evenodd"
      d="M 686 769 L 763 769 L 793 799 L 793 845 L 763 875 L 686 875 L 656 845 L 656 799 Z
         M 692 784 L 757 784 L 778 805 L 778 839 L 757 860 L 692 860 L 671 839 L 671 805 Z"
    />

    <!-- Left chevron < — stroked path, mitered apex -->
    <path
      d="M 706 797 L 687 822 L 706 847"
      stroke="#0A45F5"
      stroke-width="8"
      fill="none"
      stroke-linejoin="miter"
      stroke-linecap="butt"
    />

    <!-- Pipe | — vertical rect -->
    <rect x="720" y="797" width="8" height="50" fill="#0A45F5" />

    <!-- Right chevron > — stroked path, mitered apex -->
    <path
      d="M 742 797 L 761 822 L 742 847"
      stroke="#0A45F5"
      stroke-width="8"
      fill="none"
      stroke-linejoin="miter"
      stroke-linecap="butt"
    />

    <!-- Pedestal: upper bar (narrower) -->
    <rect x="660" y="880" width="128" height="11" fill="#13171D" />

    <!-- Pedestal: lower bar (wider) -->
    <rect x="638" y="897" width="172" height="11" fill="#13171D" />
  </g>

  <!-- ────────────────────────────────────────────────────────────────
       Wordmark + tagline. Wordmark vertically centered with the
       octagon (not the full mark, since the pedestal extends below).
       Tagline rules span the wordmark's horizontal range.
       ──────────────────────────────────────────────────────────────── -->
  <g transform="translate(300, 0)">
    <text
      x="0"
      y="125"
      font-size="100"
      font-weight="700"
      letter-spacing="-1"
      font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', Arial, sans-serif"
    >
      <tspan fill="#13171D">Open</tspan><tspan fill="#0A45F5">Agent</tspan><tspan fill="#13171D">Dojo</tspan>
    </text>

    <g transform="translate(0, 178)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#0A45F5" stroke-width="2" />
      <text
        x="360"
        y="6"
        text-anchor="middle"
        font-size="20"
        letter-spacing="8"
        font-weight="500"
        fill="#5C6B7C"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', Arial, sans-serif"
      >SUPERVISOR TRAINING</text>
      <line x1="640" y1="0" x2="720" y2="0" stroke="#0A45F5" stroke-width="2" />
    </g>
  </g>
</svg>
