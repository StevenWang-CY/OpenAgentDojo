# ---------------------------------------------------------------------------
# Pre-commit hooks. Install once with:
#   uv pip install pre-commit
#   pre-commit install
#
# These mirror what CI enforces; running them locally keeps PRs green.
# ---------------------------------------------------------------------------

repos:
  # ---------- basic hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # ---------- python (apps/api) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (lint)
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^apps/api/
      - id: ruff-format
        name: ruff (format)
        files: ^apps/api/

  # ---------- web + docs ----------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier
        files: |
          (?x)^(
            apps/web/.*\.(ts|tsx|js|jsx|json|css|md|mdx|yaml|yml)|
            packages/.*\.(ts|tsx|js|jsx|json|md|yaml|yml)|
            .*\.md|
            .*\.ya?ml
          )$
        exclude: |
          (?x)^(
            pnpm-lock\.yaml|
            apps/web/\.next/.*|
            missions/_shared/repos/.*|
            .*\.diff
          )$

  # ---------- local: forbid ABSK bearer tokens ----------
  - repo: local
    hooks:
      - id: forbid-absk
        name: forbid ABSK Bedrock bearer tokens
        # Reject any commit whose staged content matches `ABSK<8+ chars>`.
        # Mirrors the CI secret-scan workflow.
        entry: bash -c 'if git diff --cached -U0 -- ":(exclude)keys.md" | grep -E "ABSK[A-Za-z0-9+/=_-]{8,}" >/dev/null; then echo "ABSK-prefixed token found in staged diff — refusing to commit"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # ---------- local: regen openapi.json + shared-types api.gen.ts ----------
  # Schema/router edits change the contract surface that the frontend
  # consumes. Regenerate both artifacts in-place and re-stage them so the
  # commit always ships the latest generated bindings.
  - repo: local
    hooks:
      - id: regen-openapi-contracts
        name: regen openapi.json + shared-types/api.gen.ts
        entry: bash -c 'set -euo pipefail; uv --project apps/api run python apps/api/scripts/dump_openapi.py; pnpm --filter @arena/shared-types regen; git add apps/api/openapi.json packages/shared-types/src/api.gen.ts'
        language: system
        pass_filenames: false
        files: ^(apps/api/app/schemas/.*\.py|apps/api/app/.*/router\.py|apps/api/app/.*/routes\.py|apps/api/app/main\.py)$
        stages: [pre-commit]
