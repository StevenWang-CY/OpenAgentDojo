# Mission 16 — score-envelope acceptance test.
#
# Used by the mission self-tests in apps/api/tests/missions/ and
# apps/api/scripts/check_missions.py. Two synthetic event streams are
# replayed against this mission:
#
#   - "unmodified": the user accepts the agent's "performance fix"
#     (vectorised group-by that drops the discount term) verbatim and
#     submits without further edits or verification. Discount-bearing
#     orders over-report; hidden tests stay red. Expected score lands in
#     the embarrassing-middle band.
#
#   - "ideal": the user reads the net-revenue formula in reports.py,
#     names the discount term in the prompt, vectorises while keeping
#     `- discount`, and adds a regression test with non-zero discounts
#     across multiple SKUs.

acceptance:
  min_unmodified: 25
  max_unmodified: 62
  min_ideal: 88
