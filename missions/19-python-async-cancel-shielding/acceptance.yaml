# Mission 19 — score-envelope acceptance test.
#
# Used by the mission self-tests in apps/api/tests/missions/ and
# apps/api/scripts/check_missions.py. Two synthetic event streams are
# replayed against this mission:
#
#   - "unmodified": the user accepts the agent's "resilience" patch
#     (asyncio.shield around the worker) verbatim and submits without
#     further edits or verification. A cancelled request still records its
#     side effect; hidden tests stay red. Expected score lands in the
#     embarrassing-middle band.
#
#   - "ideal": the user reads the cancellation contract, names the
#     shield/ghost-write issue in the prompt, lets cancellation propagate
#     into the worker (tracked task cancelled on cleanup), and adds a
#     regression test that cancels run_request mid-flight.

acceptance:
  min_unmodified: 25
  max_unmodified: 62
  min_ideal: 88
