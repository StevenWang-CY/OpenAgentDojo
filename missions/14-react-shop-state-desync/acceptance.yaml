# Mission 14 — score-envelope acceptance test.
#
# Used by the mission self-tests in apps/api/tests/missions/ and
# apps/api/scripts/check_missions.py. Two synthetic event streams are
# replayed against this mission:
#
#   - "unmodified": the user accepts the agent patch (wrap the await in
#     try/catch, set an `error` message, but never restore the optimistic
#     item) verbatim and submits without further edits or verification. The
#     rejected item stays in the cart; hidden tests stay red. Expected
#     score lands in the embarrassing-middle band.
#
#   - "ideal": the user reads useCart.ts and the visible test before
#     opening the diff, names the optimistic-update / rollback contract in
#     the prompt, snapshots the cart and restores it in the catch, and adds
#     a regression test that drives a rejecting api and asserts the sku is
#     gone from `items`.

acceptance:
  min_unmodified: 25
  max_unmodified: 62
  min_ideal: 88
