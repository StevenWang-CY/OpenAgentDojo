# Mission 18 — intent classifier keyword sets.
# Same shape as mission 01; first matching intent (file order) wins.

intents:
  fix:
    keywords:
      - fix
      - repair
      - address
      - debug
      - resolve
      - patch
      - the bug
      - investigate
      - deadlock
      - hang

  test:
    keywords:
      - add a test
      - write a test
      - regression test
      - NumGoroutine
      - cover this
      - lock this down

  revise:
    keywords:
      - try again
      - revise
      - that's wrong
      - that is wrong
      - not quite
      - reconsider
      - rethink
      - actually
      - select
      - ctx.Done

  narrow:
    keywords:
      - only change
      - just change
      - smaller diff
      - minimal
      - keep it scoped
      - don't touch
      - do not touch

  unknown: {}
