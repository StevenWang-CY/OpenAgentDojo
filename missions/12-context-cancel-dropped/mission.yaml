id: context-cancel-dropped
version: 1
published: true
title: "Store Layer Drops the Request Context"
short_description: "store.Get/List ignore the caller's ctx and run against context.Background — cancellation never reaches the driver."
difficulty: intermediate
category: api
estimated_minutes: 30
skills_tested:
  - context
  - http
  - go

tags:
  - context_dropped
  - skill:http
  - lang:go

