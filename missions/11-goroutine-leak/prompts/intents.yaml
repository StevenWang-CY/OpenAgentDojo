# Mission 11 — intent classifier keyword sets.
#
# Same shape as mission 01 (see app/agent/intents.py): the first
# matching intent (in file order) wins; "unknown" is the fallback.

intents:
  fix:
    keywords:
      - fix
      - repair
      - address
      - debug
      - resolve
      - patch
      - the bug
      - investigate
      - leak

  test:
    keywords:
      - add a test
      - write a test
      - regression test
      - NumGoroutine
      - cover this
      - lock this down

  revise:
    keywords:
      - try again
      - revise
      - that's wrong
      - that is wrong
      - not quite
      - reconsider
      - rethink
      - actually
      - cancel

  narrow:
    keywords:
      - only change
      - just change
      - smaller diff
      - minimal
      - keep it scoped
      - don't touch
      - do not touch

  unknown: {}
