# Mission 11 — score-envelope acceptance test.
#
# Used by the nightly mission self-tests in apps/api/tests/missions/.
# Two synthetic event streams are replayed against this mission:
#
#   - "unmodified": the user accepts the agent patch (defer log.Println)
#     verbatim and submits without further edits or verification. The
#     leak persists; hidden tests stay red. Expected score lands in
#     the embarrassing-middle band.
#
#   - "ideal":     the user reads queue.go::Start before opening the
#     diff, names p.cancel and p.wg.Wait in the prompt, replaces the
#     log-only patch with the canonical cancel+wait, and adds a
#     NumGoroutine regression test.

acceptance:
  min_unmodified: 30
  max_unmodified: 60
  min_ideal: 90
