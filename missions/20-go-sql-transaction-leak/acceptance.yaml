# Mission 20 — score-envelope acceptance test.
#
# Used by the mission self-tests in apps/api/tests/missions/ and
# apps/api/scripts/check_missions.py. Two synthetic event streams are
# replayed against this mission:
#
#   - "unmodified": the user accepts the agent patch (rollback only on the
#     SQL-error branches) verbatim and submits without further edits or
#     verification. The unknown-id path still leaks; hidden tests stay
#     red. Expected score lands in the embarrassing-middle band.
#
#   - "ideal": the user reads store.go::Open and bulk.go::BulkUpdateStatus
#     before opening the diff, names the transaction lifecycle / Rollback
#     in the prompt, replaces the partial patch with a deferred rollback,
#     and adds a regression test that reuses the store after a rejected
#     batch.

acceptance:
  min_unmodified: 25
  max_unmodified: 62
  min_ideal: 88
