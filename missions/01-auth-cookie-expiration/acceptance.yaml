# Mission 01 — score-envelope acceptance test (see §19.1).
#
# Used by the nightly mission self-tests in `apps/api/tests/missions/`.
# Two synthetic event streams are replayed against this mission:
#
#   - "unmodified": the user accepts the agent patch verbatim and
#     submits without further edits or verification. Expected score
#     lands somewhere in the embarrassing-middle band.
#
#   - "ideal":     the user selects the right context, runs the auth
#     test suite before and after the patch, opens the diff, edits the
#     middleware to call `isValid`, adds a regression test, and submits.
#
# Tighten these envelopes once the scoring engine ships and we have
# baseline measurements from real users.
acceptance:
  min_unmodified: 35
  max_unmodified: 60
  min_ideal: 92
